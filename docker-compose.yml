services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - downloads:/app/downloads
    environment:
      - DOWNLOAD_DIR=/app/downloads
      - MAX_CONCURRENT=3
      - FILE_TTL_SECONDS=7200
      - CORS_ORIGINS=*

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  downloads:
